<svg width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ultra-minimal bridge icon - just two flowing arcs -->
  <g id="modern-icon">
    <!-- Single flowing arc representing connection -->
    <path d="M4 24 C8 14, 16 14, 20 24" stroke="#1a4d7a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M12 24 C16 14, 24 14, 28 24" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>
    <!-- Minimal base -->
    <line x1="2" y1="26" x2="30" y2="26" stroke="#1a4d7a" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Clean, modern typography -->
  <text x="38" y="27" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1a4d7a" letter-spacing="-0.3">BeneBridge</text>
</svg>
