<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimal geometric bridge - Ribbon style -->
  <g transform="translate(3, 8)">
    <!-- Left arch - flowing curve -->
    <path d="M2 20 Q9 5, 16 20" stroke="#1a4d7a" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Right arch - accent color -->
    <path d="M18 20 Q25 5, 32 20" stroke="#14b8a6" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Connecting base -->
    <line x1="0" y1="20" x2="34" y2="20" stroke="#1a4d7a" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
