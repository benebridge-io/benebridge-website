<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern bridge icon from your logo -->
  <g transform="translate(0, 8)">
    <!-- Simplified bridge arches -->
    <path d="M5 30 Q10 18, 15 30" stroke="#1a4d7a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M13 30 Q18 18, 23 30" stroke="#1a4d7a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M21 30 Q26 18, 31 30" stroke="#1a4d7a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Bridge base -->
    <line x1="3" y1="30" x2="33" y2="30" stroke="#1a4d7a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Accent element -->
    <circle cx="18" cy="20" r="1.5" fill="#14b8a6"/>
  </g>

  <!-- BeneBridge text in modern font -->
  <text x="42" y="38" font-family="system-ui, -apple-system, 'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1a2e4a" letter-spacing="-0.5">BeneBridge</text>
</svg>
