<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern minimalist bridge icon -->
  <g id="bridge-icon">
    <!-- Left arch -->
    <path d="M8 35 Q15 20, 22 35" stroke="#1a4d7a" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Right arch -->
    <path d="M18 35 Q25 20, 32 35" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Base line -->
    <line x1="5" y1="35" x2="35" y2="35" stroke="#1a4d7a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Connection dots -->
    <circle cx="20" cy="23" r="2" fill="#14b8a6"/>
  </g>

  <!-- BeneBridge text -->
  <text x="45" y="38" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="600" fill="#1a4d7a" letter-spacing="-0.5">BeneBridge</text>
</svg>
